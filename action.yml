name: 'Secure SBOM Action'
description: 'Sign and verify SBOMs & Digests using the SecureSBOM API'
author: 'ShiftLeftCyber'

inputs:
  secure_sbom_signing_key_id:
    description: 'Preferred. Key ID used for signing or verifying.'
    required: true

  key_id:
    description: 'Deprecated. Use secure_sbom_signing_key_id instead.'
    required: false

  secure_sbom_api_key:
    description: 'Preferred. API key for authenticating with the Secure SBOM API.'
    required: true

  api_key:
    description: 'Deprecated. Use secure_sbom_api_key instead.'
    required: false

  secure_sbom_action:
    description: |
      Action to perform.

      Supported values:
        sign_sbom         - Sign an SBOM
        verify_sbom       - Verify a signed SBOM
        sign_digest       - Sign a base64-encoded SHA256 digest

      Aliases supported for backwards compatibility:
        sign
        verify
    required: false
    default: 'sign_sbom'

  action:
    description: 'Deprecated. Use secure_sbom_action instead.'
    required: false

  sbom_file:
    description: |
      Path to the SBOM file to sign or verify.

      Required for:
        sign_sbom
        verify_sbom
        sign
        verify
    required: false

  digest:
    description: |
      Base64 encoded SHA256 digest of the raw hash.

      Required for:
        sign_digest

      Example:
        digest=$(openssl dgst -sha256 -binary sbom.json | base64)
    required: false
  
  digest_hash_algorithm:
    description: |
      The hashing algorithm used to generate the digest.

      Required for:
        sign_digest
      
      Example:
        sha256

  secure_sbom_api_url:
    description: 'Optional Secure SBOM API base URL. Defaults to production.'
    required: false

  api_url:
    description: 'Deprecated. Use secure_sbom_api_url instead.'
    required: false

  secure_sbom_use_v1_api:
    description: 'Set to true to use v1 APIs instead of v2.'
    required: false
    default: 'false'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/shiftleftcyber/secure-sbom-action:v2'
  env:
    SECURE_SBOM_SIGNING_KEY_ID: ${{ inputs.secure_sbom_signing_key_id || inputs.key_id }}
    SECURE_SBOM_API_KEY: ${{ inputs.secure_sbom_api_key || inputs.api_key }}
    SECURE_SBOM_ACTION: ${{ inputs.secure_sbom_action || inputs.action }}
    SBOM_FILE: ${{ inputs.sbom_file }}
    DIGEST: ${{ inputs.digest }}
    DIGEST_HASH_ALGORITHM: ${{ inputs.digest_hash_algorithm }}
    SECURE_SBOM_API_URL: ${{ inputs.secure_sbom_api_url || inputs.api_url }}
    SECURE_SBOM_USE_V1_API: ${{ inputs.secure_sbom_use_v1_api }}

branding:
  icon: 'shield'
  color: 'blue'
